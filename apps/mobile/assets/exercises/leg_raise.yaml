# Leg Raise Exercise Definition
name: leg_raise
display_name: "Leg Raise"
type: repetition
angle_strategy: primary
camera_mode: auto

target_muscles:
  - Lower Abs
  - Hip Flexors
equipment: "Bodyweight"
difficulty: intermediate
default_reps: 12
default_sets: 3
description: "Lying leg raises for lower abs"

angles:
  primary:
    points: [left_shoulder, left_hip, left_knee]
    description: "Kalça açısı"

state_order:
  - up
  - raise
  - down

states:
  down:
    condition: "angle > 160"
    description: "Bacaklar yerde"
  
  raise:
    condition: "angle > 100 and angle <= 160"
    description: "Kaldırma"
  
  up:
    condition: "angle <= 100"
    description: "Bacaklar yukarıda"

# Additional angles for movement validation
validate_angles:
  left_elbow_check:
    points: [left_shoulder, left_elbow, left_wrist]
    description: "Sol dirsek açısı (kol hareketi tespiti)"
  right_elbow_check:
    points: [right_shoulder, right_elbow, right_wrist]
    description: "Sağ dirsek açısı (kol hareketi tespiti)"

# Movement validation — rejects non-leg-raise movements
validation:
  arms_extended:
    condition: "left_elbow_check > 150 and right_elbow_check > 150"
    description: "Kollar düz kalmalı (leg raise için)"

counter:
  trigger_state: up
  from_state: raise

min_rep_duration: 0.7

feedback:
  momentum:
    condition: "angle < 80"
    message: "تحكم في الحركة — لا تأرجح الساق."
    severity: warning

visualization:
  lines:
    - points: [left_hip, left_knee]
      color: [128, 0, 128]
      thickness: 4
    - points: [left_knee, left_ankle]
      color: [128, 0, 128]
      thickness: 4

smoothing:
  enabled: true
  window: 3
