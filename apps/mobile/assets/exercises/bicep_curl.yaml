# Bicep Curl Exercise Definition
name: bicep_curl
display_name: "Bicep Curl"
type: repetition
camera_mode: auto

# Meta bilgiler
target_muscles:
  - Biceps
  - Brachialis
equipment: "Dumbbells"
difficulty: beginner
default_reps: 10
default_sets: 3
rest_time: "60 seconds"
benefits:
  - "Builds bicep strength"
  - "Improves arm definition"
description: "Classic bicep curl with controlled tempo"

# Both arms — averaged for front-camera counting
angles:
  primary:
    points: [left_shoulder, left_elbow, left_wrist]
    description: "Sol kol dirsek açısı"

  right_arm:
    points: [right_shoulder, right_elbow, right_wrist]
    description: "Sağ kol dirsek açısı"

# Durum makinesi (front camera reads smaller bend angles)
state_order:
  - flex
  - curl
  - down

states:
  down:
    condition: "angle > 140"
    description: "Kol düz - başlangıç pozisyonu"

  curl:
    condition: "angle > 85 and angle <= 140"
    description: "Kaldırma aşaması"

  flex:
    condition: "angle <= 85"
    description: "En üst nokta - sayaç artırılır"

# Additional angles for movement validation
validate_angles:
  left_shoulder_angle:
    points: [left_hip, left_shoulder, left_elbow]
    description: "Sol kol-gövde açısı (lateral raise tespiti)"
  right_shoulder_angle:
    points: [right_hip, right_shoulder, right_elbow]
    description: "Sağ kol-gövde açısı (lateral raise tespiti)"

# Movement validation — rejects non-curl movements
validation:
  arms_stay_at_side:
    condition: "left_shoulder_angle < 30 and right_shoulder_angle < 30"
    description: "Kollar vücuda yakın olmalı"

# Sayaç kuralı
counter:
  trigger_state: flex
  from_state: curl

# Zaman filtresi
min_rep_duration: 0.6

# Form geri bildirimleri
feedback:
  partial_rep:
    condition: "angle > 95"
    message: "اضغط بقوة في أعلى الحركة قبل النزول."
    severity: info

# Smoothing
smoothing:
  enabled: true
  window: 4

# Görselleştirme
visualization:
  lines:
    - points: [left_shoulder, left_elbow]
      color: [0, 0, 255]
      thickness: 4
    - points: [left_elbow, left_wrist]
      color: [0, 0, 255]
      thickness: 4
    - points: [right_shoulder, right_elbow]
      color: [0, 0, 255]
      thickness: 4
    - points: [right_elbow, right_wrist]
      color: [0, 0, 255]
      thickness: 4
