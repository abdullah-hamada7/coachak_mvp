# Deadlift Exercise Definition
name: deadlift
display_name: "Deadlift"
type: repetition
angle_strategy: primary
camera_mode: auto

target_muscles:
  - Hamstrings
  - Glutes
  - Lower Back
equipment: "Bodyweight or Barbell"
difficulty: intermediate
default_reps: 8
default_sets: 3
description: "Hip hinge movement for posterior chain"

angles:
  primary:
    points: [left_shoulder, left_hip, left_knee]
    description: "Kalça menteşe açısı"

state_order:
  - up
  - hinge
  - down

states:
  up:
    condition: "angle > 165"
    description: "Dik duruş"
  
  hinge:
    condition: "angle > 100 and angle <= 165"
    description: "Eğilme aşaması"
  
  down:
    condition: "angle <= 100"
    description: "Alt pozisyon"

# Additional angles for movement validation
validate_angles:
  left_elbow_check:
    points: [left_shoulder, left_elbow, left_wrist]
    description: "Sol dirsek açısı (kol hareketi tespiti)"

# Movement validation — rejects non-deadlift movements
validation:
  arms_extended:
    condition: "left_elbow_check > 150"
    description: "Kollar düz kalmalı (deadlift için)"

counter:
  trigger_state: up
  from_state: down

min_rep_duration: 0.7

feedback:
  rounded_back:
    condition: "angle < 90"
    message: "افرد ظهرك — لا تقوّس أسفل الظهر."
    severity: warning

visualization:
  lines:
    - points: [left_shoulder, left_hip]
      color: [139, 69, 19]
      thickness: 4
    - points: [left_hip, left_knee]
      color: [139, 69, 19]
      thickness: 4

smoothing:
  enabled: true
  window: 3
