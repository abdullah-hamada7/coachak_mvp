# Calf Raise Exercise Definition
name: calf_raise
display_name: "Calf Raise"
type: repetition
camera_mode: auto

target_muscles:
  - Calves
  - Soleus
equipment: "Bodyweight"
difficulty: beginner
default_reps: 15
default_sets: 3
description: "Standing calf raises for lower leg strength"

angles:
  primary:
    points: [left_hip, left_knee, left_ankle]
    description: "Bacak açısı"

state_order:
  - up
  - raise
  - down

states:
  down:
    condition: "angle > 165"
    description: "Topuklar yerde"
  
  raise:
    condition: "angle > 155 and angle <= 165"
    description: "Kaldırma aşaması"
  
  up:
    condition: "angle <= 155"
    description: "En üst nokta"

# Additional angles for movement validation
validate_angles:
  left_elbow_check:
    points: [left_shoulder, left_elbow, left_wrist]
    description: "Sol dirsek açısı (kol hareketi tespiti)"
  right_elbow_check:
    points: [right_shoulder, right_elbow, right_wrist]
    description: "Sağ dirsek açısı (kol hareketi tespiti)"

# Movement validation — rejects non-calf-raise movements
validation:
  arms_extended:
    condition: "left_elbow_check > 150 and right_elbow_check > 150"
    description: "Kollar düz kalmalı (calf raise için)"

counter:
  trigger_state: up
  from_state: raise

min_rep_duration: 0.5

feedback:
  bent_knees:
    condition: "angle < 150"
    message: "حافظ على ساقيك مستقيمتين."
    severity: warning

visualization:
  lines:
    - points: [left_knee, left_ankle]
      color: [0, 255, 255]
      thickness: 4

smoothing:
  enabled: true
  window: 3
