services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: coachak
      POSTGRES_PASSWORD: coachak
      POSTGRES_DB: coachak
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coachak -d coachak"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../services/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://coachak:coachak@postgres:5432/coachak
      REDIS_URL: redis://redis:6379/0
      FITNESS_KNOWLEDGE_PATH: /fitness-knowledge
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../services/api:/app
      - ../packages/fitness-knowledge:/fitness-knowledge:ro

volumes:
  postgres_data:
  redis_data:
